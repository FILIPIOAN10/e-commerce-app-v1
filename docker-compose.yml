version: '3.9'

services:

  postgres:
    image: postgres:16
    container_name: ecommerce-postgres

    environment:
      POSTGRES_DB: ecommerce_v1
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: cisco@123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: always

  redis:
    image: redis:7.2
    container_name: ecommerce-redis

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    command: redis-server --appendonly yes

    restart: always

  app:
    build: .

    container_name: ecommerce-app

    depends_on:
      - postgres
      - redis

    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ecommerce_v1
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: cisco@123

      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

      SPRING_JPA_HIBERNATE_DDL_AUTO: update

    restart: always

volumes:
  postgres_data:
  redis_data: